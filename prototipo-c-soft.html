<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Peerlog — pronto</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Geist:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-1: #fdf3e3;
    --bg-2: #e9eed7;
    --bg-3: #e8d9f7;
    --card: #fbf4e4;
    --ink: #1c1b22;
    --ink-soft: #56535e;
    --accent: #f0501c;
    --violet: #7846d4;
    --mint: #93dabc;
    --peach: #ffc3a0;
    --lilac: #d8c5fa;
    --rule: rgba(28,27,34,0.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Geist", system-ui, sans-serif;
    color: var(--ink);
    min-height: 100svh;
    overflow-x: hidden;
    background:
      linear-gradient(165deg, var(--bg-1) 0%, var(--bg-1) 40%, var(--bg-2) 75%, var(--bg-3) 100%);
    position: relative;
  }
  /* subtle grid */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(28,27,34,0.05) 0.5px, transparent 0.5px),
      linear-gradient(90deg, rgba(28,27,34,0.05) 0.5px, transparent 0.5px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  /* floating blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.55;
    pointer-events: none;
    z-index: 1;
  }
  .blob.b1 { top: -60px; left: -40px; width: 220px; height: 130px; background: var(--peach); border-radius: 60% 40% 50% 50% / 60% 50% 50% 40%; animation: float1 14s ease-in-out infinite; }
  .blob.b2 { bottom: -80px; right: -60px; width: 260px; height: 180px; background: var(--lilac); border-radius: 50% 60% 40% 50% / 50% 40% 60% 50%; animation: float2 18s ease-in-out infinite; }
  .blob.b3 { top: 35%; right: -100px; width: 200px; height: 200px; background: var(--mint); opacity: 0.35; animation: float1 22s ease-in-out infinite reverse; }
  @keyframes float1 {
    0%, 100% { transform: translate(0, 0) rotate(0); }
    50% { transform: translate(20px, 30px) rotate(8deg); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0, 0) rotate(0); }
    50% { transform: translate(-25px, -20px) rotate(-10deg); }
  }
  /* decorative shapes */
  .shape {
    position: fixed;
    z-index: 2;
    pointer-events: none;
  }
  .shape.diamond-1 { top: 18%; right: 28px; width: 14px; height: 14px; background: var(--violet); transform: rotate(45deg); opacity: 0.55; animation: bob 6s ease-in-out infinite; }
  .shape.diamond-2 { bottom: 24%; left: 36px; width: 10px; height: 10px; background: var(--ink); transform: rotate(45deg); opacity: 0.35; animation: bob 8s ease-in-out infinite reverse; }
  .shape.dot-1 { top: 9%; left: 26%; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bob 5s ease-in-out infinite 1s; }
  .shape.dot-2 { bottom: 30%; right: 24%; width: 6px; height: 6px; background: var(--peach); border-radius: 50%; animation: bob 7s ease-in-out infinite 2s; }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(45deg); }
    50% { transform: translateY(-10px) rotate(45deg); }
  }
  .shape.dot-1, .shape.dot-2 {
    animation-name: bobRound;
  }
  @keyframes bobRound {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  .wrap {
    position: relative;
    z-index: 3;
    max-width: 420px;
    margin: 0 auto;
    padding: 24px 20px 28px;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
  }

  /* top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 24px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 999px;
    padding: 6px 10px 6px 8px;
    font-size: 11px;
    font-weight: 500;
  }
  .pill .live-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* main card */
  .card {
    position: relative;
    background: var(--card);
    border: 1px solid rgba(28,27,34,0.08);
    border-radius: 32px;
    padding: 38px 26px 30px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 30px 60px -25px rgba(28,27,34,0.25),
      0 12px 30px -18px rgba(28,27,34,0.18);
  }
  /* card corner accents */
  .card::before, .card::after {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    border: 1.5px solid var(--ink);
    border-radius: 4px;
  }
  .card::before { top: 14px; left: 14px; border-right: none; border-bottom: none; }
  .card::after { bottom: 14px; right: 14px; border-left: none; border-top: none; }

  /* floating avatars on card edges */
  .avatar-top, .avatar-bot {
    position: absolute;
    width: 70px; height: 70px;
    border-radius: 50%;
    border: 3px solid var(--ink);
    overflow: hidden;
    z-index: 4;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
  }
  .avatar-top {
    top: -22px;
    left: -10px;
    background: var(--mint);
    transform: rotate(-8deg);
    animation: floatTop 6s ease-in-out infinite;
  }
  .avatar-bot {
    bottom: -22px;
    right: -10px;
    background: var(--peach);
    transform: rotate(8deg);
    animation: floatBot 7s ease-in-out infinite;
  }
  .avatar-top:hover { transform: rotate(-12deg) scale(1.08); animation: none; }
  .avatar-bot:hover { transform: rotate(12deg) scale(1.08); animation: none; }
  @keyframes floatTop {
    0%, 100% { transform: rotate(-8deg) translateY(0); }
    50% { transform: rotate(-6deg) translateY(-4px); }
  }
  @keyframes floatBot {
    0%, 100% { transform: rotate(8deg) translateY(0); }
    50% { transform: rotate(10deg) translateY(-4px); }
  }

  .face-ai, .face-qa { position: absolute; inset: 0; }
  .face-ai::before {
    content: ""; position: absolute;
    top: 28%; left: 50%; transform: translateX(-50%);
    width: 42px; height: 26px;
    background: #c44a1a;
    border-radius: 26px 26px 4px 4px;
  }
  .face-ai::after {
    content: ""; position: absolute;
    top: 46%; left: 50%; transform: translateX(-50%);
    width: 30px; height: 30px;
    background: #f4c8a8;
    border-radius: 50%;
  }
  .face-qa::before {
    content: ""; position: absolute;
    top: 30%; left: 50%; transform: translateX(-50%);
    width: 38px; height: 22px;
    background: #1a1a1f;
    border-radius: 22px 22px 0 0;
  }
  .face-qa::after {
    content: ""; position: absolute;
    top: 42%; left: 50%; transform: translateX(-50%);
    width: 30px; height: 34px;
    background: #ffd9a8;
    border-radius: 50% 50% 45% 45%;
  }

  .badge {
    position: absolute;
    bottom: -2px;
    right: -2px;
    background: var(--violet);
    color: white;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.05em;
    padding: 3px 6px;
    border-radius: 999px;
    border: 2px solid var(--card);
    z-index: 5;
  }
  .badge.qa-badge { background: var(--accent); }

  /* brand */
  .brand-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .brand-mark { width: 26px; height: 26px; position: relative; }
  .brand-mark span {
    position: absolute; width: 13px; height: 13px; border-radius: 50%;
    background: var(--accent);
  }
  .brand-mark span:nth-child(1) { top: 0; left: 3.5px; }
  .brand-mark span:nth-child(2) { bottom: 0; left: 0; opacity: 0.9; }
  .brand-mark span:nth-child(3) { bottom: 0; right: 0; opacity: 0.75; }
  .brand-name {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  /* headline */
  .headline {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 400;
    font-size: clamp(34px, 9.5vw, 44px);
    line-height: 1.05;
    letter-spacing: -0.035em;
    text-align: center;
    color: var(--ink);
    margin: 0 0 18px;
    font-variation-settings: "opsz" 60;
  }
  .headline .accent {
    color: var(--accent);
    font-weight: 500;
    font-style: italic;
  }
  .headline .underline {
    position: relative;
    white-space: nowrap;
  }
  .headline .underline::after {
    content: "";
    position: absolute;
    left: 4%; right: 4%; bottom: 4px;
    height: 7px;
    background: var(--peach);
    z-index: -1;
    border-radius: 4px;
  }

  /* sub headline strong */
  .sub {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 6.5vw, 28px);
    line-height: 1.15;
    letter-spacing: -0.025em;
    text-align: center;
    margin: 0 0 22px;
    color: var(--ink);
  }
  .sub .chip {
    display: inline-block;
    background: var(--ink);
    color: var(--bg-1);
    padding: 2px 12px 4px;
    border-radius: 999px;
    margin: 0 2px;
    transform: rotate(-2deg);
  }

  /* divider w/ dots */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin: 0 0 18px;
    color: var(--ink-soft);
  }
  .divider .line {
    flex: 1;
    height: 1px;
    background: var(--rule);
    max-width: 60px;
  }
  .divider .dot {
    width: 5px; height: 5px;
    background: var(--ink-soft);
    border-radius: 50%;
  }

  /* tagline */
  .tagline {
    font-family: "Geist", sans-serif;
    font-weight: 500;
    font-size: 15px;
    text-align: center;
    line-height: 1.4;
    color: var(--ink-soft);
    margin: 0;
  }

  /* socials section */
  .social-section {
    margin-top: 32px;
    text-align: center;
  }
  .social-label {
    font-family: "Geist", sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }
  .socials {
    display: flex;
    justify-content: center;
    gap: 12px;
  }
  .social {
    width: 56px; height: 56px;
    border-radius: 18px;
    background: var(--card);
    border: 1px solid rgba(28,27,34,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    text-decoration: none;
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.8) inset,
      0 6px 14px -6px rgba(28,27,34,0.18);
  }
  .social:hover, .social:focus-visible {
    transform: translateY(-4px) rotate(-3deg);
    background: var(--ink);
    color: var(--bg-1);
    outline: none;
  }
  .social:nth-child(2):hover { transform: translateY(-4px) rotate(3deg); }
  .social:nth-child(4):hover { transform: translateY(-4px) rotate(3deg); }
  .social svg { width: 22px; height: 22px; }

  .footnote {
    margin-top: auto;
    padding-top: 24px;
    text-align: center;
    font-family: "Geist", sans-serif;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 0.02em;
  }

  /* entrance */
  .reveal { opacity: 0; transform: translateY(12px); animation: rise 0.8s cubic-bezier(.2,.7,.2,1) forwards; }
  .reveal.d1 { animation-delay: 0.05s; }
  .reveal.d2 { animation-delay: 0.18s; }
  .reveal.d3 { animation-delay: 0.32s; }
  .reveal.d4 { animation-delay: 0.46s; }
  .reveal.d5 { animation-delay: 0.60s; }
  .reveal.d6 { animation-delay: 0.74s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div class="blob b1" aria-hidden="true"></div>
  <div class="blob b2" aria-hidden="true"></div>
  <div class="blob b3" aria-hidden="true"></div>
  <div class="shape diamond-1" aria-hidden="true"></div>
  <div class="shape diamond-2" aria-hidden="true"></div>
  <div class="shape dot-1" aria-hidden="true"></div>
  <div class="shape dot-2" aria-hidden="true"></div>

  <main class="wrap">
    <div class="topbar reveal d1">
      <span class="pill"><span class="live-dot"></span>Próximamente · 2026</span>
      <span>v0 · build</span>
    </div>

    <section class="card reveal d2">
      <div class="avatar-top" aria-label="Avatar AI">
        <div class="face-ai"></div>
        <span class="badge">AI</span>
      </div>

      <div class="brand-row reveal d3">
        <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="brand-name">Peerlog</div>
      </div>

      <h1 class="headline reveal d4">
        El <span class="accent">conocimiento</span> práctico merece <span class="underline">un&nbsp;lugar.</span>
      </h1>

      <h2 class="sub reveal d5">
        Peerlog lo está <span class="chip">construyendo</span>
      </h2>

      <div class="divider" aria-hidden="true">
        <div class="line"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="line"></div>
      </div>

      <p class="tagline reveal d6">Seguinos para no perderte el lanzamiento.</p>

      <div class="avatar-bot" aria-label="Avatar QA">
        <div class="face-qa"></div>
        <span class="badge qa-badge">QA</span>
      </div>
    </section>

    <section class="social-section reveal d6">
      <div class="social-label">Donde estamos</div>
      <div class="socials">
        <a href="#" class="social" aria-label="Peerlog">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="12" cy="6" r="3"/><circle cx="6.5" cy="15.5" r="3"/><circle cx="17.5" cy="15.5" r="3"/></svg>
        </a>
        <a href="#" class="social" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4.98 3.5c0 1.38-1.12 2.5-2.5 2.5S0 4.88 0 3.5 1.12 1 2.48 1s2.5 1.12 2.5 2.5zM.22 8h4.56v14H.22V8zm7.32 0h4.37v1.92h.06c.61-1.15 2.1-2.36 4.32-2.36 4.62 0 5.48 3.04 5.48 7v7.44h-4.56v-6.6c0-1.57-.03-3.6-2.2-3.6-2.2 0-2.54 1.72-2.54 3.49V22H7.54V8z"/></svg>
        </a>
        <a href="#" class="social" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
        </a>
        <a href="#" class="social" aria-label="X">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2H21.5l-7.5 8.57L23 22h-6.86l-5.37-7.02L4.6 22H1.34l8.04-9.19L1 2h7.02l4.86 6.42L18.24 2zm-1.2 18h1.86L7.05 4H5.07l11.97 16z"/></svg>
        </a>
      </div>
    </section>

    <div class="footnote reveal d6">Hecho con cuidado en Buenos Aires</div>
  </main>
</body>
</html>
